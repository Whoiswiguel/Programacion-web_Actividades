<!DOCTYPE html>
<html lang="en">
<head>
    <title>Image Gallery</title>
    <meta charset="utf-8">
    <style>
        body { background-color: #333333; color: #EAEAEA; font-family: Arial, sans-serif; }
        #gallery { width: 800px; }
        #gallery ul { width: 300px; list-style-type: none; float: left; padding: 0; }
        #gallery li { display: inline; float: left; padding: 16px; }
        #gallery img { border-style: none; }
        figure { padding-top: 30px; text-align: center; }
        figcaption { font-weight: bold; font-size: 1.5em; }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            $('#gallery a').hover(function(){
                var galleryHref = $(this).attr('href');
                var galleryAlt = $(this).attr('title');

                $('figure img').attr({ src: galleryHref, alt: galleryAlt });
                $('figcaption').html(galleryAlt);


            });
        });
    </script>
</head>
<body>
    <h1>Image Gallery</h1>
    <div id="gallery">
        <ul>
            <li><a href="photo1.jpg" title="Golden Gate Bridge"><img src="photo1thumb.png" width="100" height="75" alt="Golden Gate Bridge"></a></li>
            <li><a href="photo2.jpg" title="Rocky Coast"><img src="photo2thumb.jpg" width="100" height="75" alt="Rocky Coast"></a></li>
            <li><a href="photo3.jpg" title="Mountain Lake"><img src="photo3thumb.jpg" width="100" height="75" alt="Mountain Lake"></a></li>
            <li><a href="photo4.jpg" title="Forest Trail"><img src="photo4thumb.jpg" width="100" height="75" alt="Forest Trail"></a></li>
            <li><a href="photo5.jpg" title="Desert View"><img src="photo5thumb.jpg" width="100" height="75" alt="Desert View"></a></li>
            <li><a href="photo6.jpg" title="City Lights"><img src="photo6thumb.jpg" width="100" height="75" alt="City Lights"></a></li>
        </ul>
        <figure>
            <img src="photo1.jpg" width="500" height="333" alt="Golden Gate Bridge">
            <figcaption>Golden Gate Bridge</figcaption>
        </figure>
    </div>
</body>
</html>
