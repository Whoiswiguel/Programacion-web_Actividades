<!DOCTYPE html>
<html lang="en">
<head>
    <title>Box Sizing Border Box</title>
    <meta charset="utf-8">
    <style>
        * { box-sizing: border-box; }
        .box { float: left; width: 30%; height: 150px; padding: 20px; margin: 10px; border: 2px solid #666; background-color: #ddd; }
    </style>
</head>
<body>
    <h1>box-sizing set to border-box</h1>
    <div class="box">Element 1</div><div class="box">Element 2</div><div class="box">Element 3</div>
</body>
</html>
