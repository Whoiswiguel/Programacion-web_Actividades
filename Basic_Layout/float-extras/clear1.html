<!DOCTYPE html>
<html lang="en">
<head>
    <title>Clear Float with Line Break</title>
    <meta charset="utf-8">
    <style>
        h1 { background-color: #A8C682; padding: 5px; }
        .float { float: left; margin-right: 10px; border: 3px ridge #000000; }
        div { background-color: #F3F1BF;  }
        .clearleft { clear: left; }
        .scrollbox { background-color: #F3F1BF; overflow: scroll; width: 300px; height: 100px; }
    </style>
</head>
<body>
    <h1>Yellow Lady Slipper</h1>
    <div class="">
        <img class="float" src="yls.jpg" alt="Yellow Lady Slipper" height="100" width="100">
        <p>The Yellow Lady Slipper grows in wooded areas and blooms in June each year. The flower is a member of the orchid family.</p>
        <br class="clearleft">
    </div>
    <h2 class="">Be Green When Enjoying Wildflowers</h2>
    <p>Enjoy wild plants in their native surroundings. Support organizations dedicated to preserving habitat.</p>
</body>
</html>
