<!DOCTYPE html>
<html lang="en">
<head>
    <title>Alternate Two Column Layout</title>
    <meta charset="utf-8">
    <style>
        body { background-color: #333; font-family: Arial, sans-serif; }
        #wrapper { width: 80%; margin: auto; background-color: #fff; }
        header { background-color: #dedede; padding: 1em; }
        nav { float: left; width: 160px; padding: 1em; }
        main { margin-left: 190px; padding: 1em; }
        footer { margin-left: 190px; background-color: #dedede; text-align: center; padding: 0.5em; }
    </style>
</head>
<body>
    <div id="wrapper">
        <header><h1>Alternate Wireframe</h1></header>
        <nav><a href="#">Home</a><br><a href="#">About</a><br><a href="#">Contact</a></nav>
        <main><h2>Main Column</h2><p>The footer is placed under the main column instead of clearing under both columns.</p></main>
        <footer>Footer in the right column</footer>
    </div>
</body>
</html>
