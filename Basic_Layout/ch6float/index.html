<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS Float</title>
    <meta charset="utf-8">
    <style>
        h1 { background-color: #A8C682; padding: 5px; color: #000000; }
        p { font-family: Arial, sans-serif; }
        div { background-color: #F3F1BF; padding: 0.5em; }
        .float { float: left; margin-right: 10px; border: 3px ridge #000000; }
    </style>
</head>
<body>
    <h1>Yellow Lady Slipper</h1>
    <div>
        <img class="float" src="yls.jpg" alt="Yellow Lady Slipper" height="100" width="100">
        <p>The Yellow Lady Slipper grows in wooded areas and blooms in June each year. The flower is a member of the orchid family.</p>
    </div>
    <h2>Be Green When Enjoying Wildflowers</h2>
    <p>Enjoy wild plants in their native surroundings. Protect their environment in all possible ways.</p>
</body>
</html>
