<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS Text Properties</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Verdana, Arial, sans-serif; background-color: #f5f5f5; color: #222; }
        h1 { font-family: Georgia, "Times New Roman", serif; color: #003366; text-shadow: 2px 2px 4px #aaa; }
        h2 { font-family: Georgia, "Times New Roman", serif; letter-spacing: 0.05em; }
        p { font-size: 1em; line-height: 160%; text-indent: 2em; }
        .important { font-weight: bold; font-style: italic; color: #006666; }
    </style>
</head>
<body>
    <h1>Configuring Text with CSS</h1>
    <h2>Typography Example</h2>
    <p>CSS can control typeface, size, spacing, alignment, decoration, and many other visual characteristics.</p>
    <p class="important">This paragraph uses a class selector to highlight important content.</p>
</body>
</html>
