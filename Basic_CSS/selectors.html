<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS Selectors</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; background-color: #eef6ff; }
        h1 { color: #003366; }
        .notice { background-color: #fff7cc; border-left: 6px solid #cc9900; padding: 1em; }
        #wrapper { width: 80%; margin: auto; background-color: #ffffff; padding: 1em; }
        nav a { color: #006699; font-weight: bold; }
    </style>
</head>
<body>
    <div id="wrapper">
        <h1>Element, Class, ID, and Descendant Selectors</h1>
        <nav><a href="#">Home</a> | <a href="#">Services</a></nav>
        <p class="notice">This paragraph is styled with a class selector.</p>
        <p>The page container is styled with an ID selector.</p>
    </div>
</body>
</html>
