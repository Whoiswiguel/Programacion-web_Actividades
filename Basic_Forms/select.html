<!DOCTYPE html>
<html lang="en">
<head>
<title>Select List Practice</title>
<meta charset="utf-8">
<style>
body { font-family: Arial, sans-serif; margin: 2em; }
</style>
</head>
<body>
<h1>Select List Practice</h1>
<form method="get">
  <label for="favbrowser">Select your favorite browser:</label><br>
  <select size="1" name="favbrowser" id="favbrowser">
    <option>Select your favorite browser</option>
    <option value="Edge">Edge</option>
    <option value="Firefox">Firefox</option>
    <option value="Chrome">Chrome</option>
  </select>
  <br><br>
  <label for="jumpmenu">Menu with four visible items:</label><br>
  <select size="4" name="jumpmenu" id="jumpmenu">
    <option value="index.html">Home</option>
    <option value="products.html">Products</option>
    <option value="services.html">Services</option>
    <option value="about.html">About</option>
    <option value="contact.html">Contact</option>
  </select>
  <br><br>
  <input type="submit" value="Send">
  <input type="reset">
</form>
</body>
</html>
