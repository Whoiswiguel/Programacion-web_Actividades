<!DOCTYPE html>
<html lang="en">
<head>
<title>Comment Form</title>
<meta charset="utf-8">
<style>
body { font-family: Arial, sans-serif; margin: 2em; }
form { display: grid; grid-template-columns: 8em 1fr; gap: 1em; background-color: #EAEAEA; width: 60%; min-width: 24em; padding: 1.5em; }
label { text-align: right; }
#mySubmit { grid-column: 2 / 3; width: 10em; }
</style>
</head>
<body>
<h1>Send Us Your Comments</h1>
<p>Required fields are marked with an asterisk *.</p>
<form method="post" action="https://webdevbasics.net/scripts/demo.php">
  <label for="myName">*Name:</label>
  <input type="text" name="myName" id="myName" required placeholder="your first and last name">
  <label for="myEmail">*E-mail:</label>
  <input type="email" name="myEmail" id="myEmail" required placeholder="you@yourdomain.com">
  <label for="myRating">Rating (1 - 10):</label>
  <input type="range" name="myRating" id="myRating" min="1" max="10">
  <label for="myComments">*Comments:</label>
  <textarea name="myComments" id="myComments" rows="2" cols="20" required></textarea>
  <input id="mySubmit" type="submit" value="Submit">
</form>
</body>
</html>
