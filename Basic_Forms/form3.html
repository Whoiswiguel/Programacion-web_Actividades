<!DOCTYPE html>
<html lang="en">
<head>
<title>Contact Form</title>
<meta charset="utf-8">
<style>
body { font-family: Georgia, "Times New Roman", serif; margin: 2em; }
label { display: inline-block; margin-bottom: .6em; }
</style>
</head>
<body>
<h1>Contact Us</h1>
<form method="get">
  <label>First Name: <input type="text" name="fname" id="fname"></label><br>
  <label>Last Name: <input type="text" name="lname" id="lname"></label><br>
  <label>E-mail: <input type="text" name="email" id="email"></label><br>
  <label for="comments">Comments:</label><br>
  <textarea name="comments" id="comments" rows="4" cols="40"></textarea><br><br>
  <input type="submit" value="Contact">
  <input type="reset">
</form>
</body>
</html>
