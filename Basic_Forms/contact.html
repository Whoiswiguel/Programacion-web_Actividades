<!DOCTYPE html>
<html lang="en">
<head>
<title>Contact Form</title>
<meta charset="utf-8">
<style>
form { display: grid; grid-template-rows: auto; grid-template-columns: 6em 1fr; gap: 1em; background-color: #EAEAEA; font-family: Arial, sans-serif; width: 60%; min-width: 20em; padding: 1.5em; }
label { text-align: right; }
input[type="submit"] { grid-column: 2 / 3; width: 10em; }
</style>
</head>
<body>
<h1>Contact Us</h1>
<form method="post" action="https://webdevbasics.net/scripts/demo.php">
  <label for="myName">Name:</label>
  <input type="text" name="myName" id="myName">
  <label for="myEmail">E-mail:</label>
  <input type="text" name="myEmail" id="myEmail">
  <label for="myComments">Comments:</label>
  <textarea name="myComments" id="myComments" rows="2" cols="20"></textarea>
  <input type="submit" value="Submit">
</form>
</body>
</html>
