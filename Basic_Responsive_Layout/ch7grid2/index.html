<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lighthouse Grid Line Numbers</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; }
        #wrapper { display: grid; grid-template-columns: 150px 1fr; grid-template-rows: 100px auto 50px; width: 80%; margin: auto; border: 1px solid #999; }
        header { grid-row: 1 / 2; grid-column: 1 / 3; background-color: #9fb4c7; padding: 1em; }
        nav { grid-row: 2 / 3; grid-column: 1 / 2; background-color: #e6eef5; padding: 1em; }
        main { grid-row: 2 / 3; grid-column: 2 / 3; padding: 1em; }
        footer { grid-row: 3 / 4; grid-column: 1 / 3; background-color: #9fb4c7; text-align: center; padding: 1em; }
    </style>
</head>
<body>
    <div id="wrapper">
        <header><h1>Lighthouse Island Bistro</h1></header>
        <nav><a href="#">Home</a><br><a href="#">Menu</a><br><a href="#">Directions</a><br><a href="#">Contact</a></nav>
        <main><h2>Locally Roasted Free-Trade Coffee</h2><p>Enjoy coffee, pastries, lunch, and panoramic views.</p></main>
        <footer>Copyright &copy; 2026</footer>
    </div>
</body>
</html>
