<!DOCTYPE html>
<html lang="en">
<head>
    <title>Grid Gallery</title>
    <meta charset="utf-8">
    <style>
        h1 { text-align: center; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, 200px); grid-template-rows: auto; grid-gap: 2em; gap: 2em; justify-content: center; }
    </style>
</head>
<body>
    <h1>Grid Gallery</h1>
    <div id="gallery">
        <img src="bird1.jpg" width="200" height="150" alt="Bird 1">
        <img src="bird2.jpg" width="200" height="150" alt="Bird 2">
        <img src="bird3.jpg" width="200" height="150" alt="Bird 3">
        <img src="bird4.jpg" width="200" height="150" alt="Bird 4">
        <img src="bird5.jpg" width="200" height="150" alt="Bird 5">
        <img src="bird6.jpg" width="200" height="150" alt="Bird 6">
    </div>
</body>
</html>
