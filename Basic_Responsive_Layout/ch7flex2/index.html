<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lighthouse Bistro Flexbox</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; }
        #wrapper { width: 80%; margin: auto; border: 1px solid #999; }
        header, footer { background-color: #9fb4c7; padding: 1em; text-align: center; }
        #content { display: flex; }
        nav { flex: none; background-color: #B3C7E6; padding: 1em; order: 1; }
        main { flex: 6; min-width: 20em; background-color: #FFFFFF; padding: 1em; order: 2; }
        aside { flex: 4; background-color: #EAEAEA; padding: 1em; order: 3; text-align: center; }
        aside img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <div id="wrapper">
        <header><h1>Lighthouse Bistro</h1></header>
        <div id="content">
            <nav><a href="#">Home</a><br><a href="#">Menu</a><br><a href="#">Directions</a><br><a href="#">Contact</a></nav>
            <aside><img src="lighthouse.jpg" alt="Lighthouse"><br><small>Cana Island Lighthouse</small></aside>
            <main>
                <h2>Locally Roasted Free-Trade Coffee</h2>
                <p>Indulge in the aroma of freshly ground roast coffee and specialty drinks.</p>
                <h2>Specialty Pastries</h2>
                <p>Enjoy fresh baked organic pastries, muffins, scones, and cinnamon rolls.</p>
            </main>
        </div>
        <footer>Copyright &copy; 2026</footer>
    </div>
</body>
</html>
