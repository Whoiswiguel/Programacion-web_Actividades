<!DOCTYPE html>
<html lang="en">
<head>
    <title>Menu Table with Pseudo-Classes</title>
    <meta charset="utf-8">
    <style>
        table { margin: auto; border: 5px solid #000066; width: 600px; border-spacing: 0; }
        td, th { padding: 0.5em; border-style: none; font-family: Arial, sans-serif; }
        caption { font-family: Verdana, sans-serif; font-weight: bold; font-size: 1.2em; padding-bottom: 0.5em; }
        tr:nth-of-type(even) { background-color: #eaeaea; }
        tr:first-of-type { background-color: #006; color: #EAEAEA; }
    </style>
</head>
<body>

<table>
    <caption>Lunch Menu</caption>
    <tr><th>Item</th><th>Description</th><th>Price</th></tr>
    <tr><td>Turkey Sandwich</td><td>Turkey, lettuce, tomato, and cheese</td><td>$8.95</td></tr>
    <tr><td>Veggie Wrap</td><td>Grilled vegetables with hummus</td><td>$7.95</td></tr>
    <tr><td>Chicken Salad</td><td>Mixed greens with grilled chicken</td><td>$9.95</td></tr>
    <tr><td>Soup of the Day</td><td>Served with fresh bread</td><td>$5.95</td></tr>
</table>

</body>
</html>
